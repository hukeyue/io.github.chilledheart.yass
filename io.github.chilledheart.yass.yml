id: io.github.chilledheart.yass
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: yass
finish-args:
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --persist=.yass
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=com.canonical.indicator.application
  - --talk-name=org.ayatana.indicator.application
cleanup:
 - /share/doc
 - /share/pixmaps
modules:
  - name: yass
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DFLATHUB_BUILD=on
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - -DINSTALL_FLATHUB_METAINFO=on
      - -DUSE_ZLIB=on
      - -DUSE_SYSTEM_ZLIB=on
      - -DUSE_JSONCPP=on
      - -DUSE_CARES=on
      - -DUSE_QT6=on
      - -DGUI=on
      - -DCLI=off
      - -DSERVER=off
      - -DBUILD_SHARED_LIBS=on
      - -DUSE_DEBUG_FISSION=off
      - -DUSE_COMPRESS_DEBUG_SECTIONS=off
    sources:
      - type: archive
        url: https://github.com/hukeyue/yass/releases/download/1.22.11/yass-1.22.11.tar.zst
        sha256: 2d197fc5fe289dd7261942b5c36517fe464ca3cdf18f4d71b437a898eefd7d5e
